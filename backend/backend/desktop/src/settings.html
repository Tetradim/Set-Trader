<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Settings - Bracket Bot</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e5e5e5;
      padding: 24px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 24px;
      color: #fff;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    label {
      display: block;
      font-size: 13px;
      color: #888;
      margin-bottom: 8px;
    }
    
    input {
      width: 100%;
      padding: 12px 14px;
      background: #1a1a24;
      border: 1px solid #2a2a3a;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      font-family: 'SF Mono', Monaco, monospace;
      transition: border-color 0.2s;
    }
    
    input:focus {
      outline: none;
      border-color: #22c55e;
    }
    
    input::placeholder {
      color: #555;
    }
    
    .hint {
      font-size: 12px;
      color: #666;
      margin-top: 6px;
    }
    
    .actions {
      margin-top: auto;
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }
    
    button {
      padding: 10px 20px;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .btn-primary {
      background: #22c55e;
      color: #000;
      border: none;
    }
    
    .btn-primary:hover {
      background: #16a34a;
    }
    
    .btn-secondary {
      background: transparent;
      color: #888;
      border: 1px solid #333;
    }
    
    .btn-secondary:hover {
      background: #1a1a24;
      color: #fff;
    }
    
    .status {
      padding: 10px;
      border-radius: 6px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }
    
    .status.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      color: #22c55e;
      border: 1px solid rgba(34, 197, 94, 0.2);
    }
    
    .status.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      color: #ef4444;
      border: 1px solid rgba(239, 68, 68, 0.2);
    }
  </style>
</head>
<body>
  <h1>API Settings</h1>
  
  <div id="status" class="status"></div>
  
  <div class="form-group">
    <label for="alpacaKey">Alpaca API Key</label>
    <input type="password" id="alpacaKey" placeholder="Enter your Alpaca API key">
    <p class="hint">Get your API key from <a href="https://app.alpaca.markets" style="color: #22c55e;">alpaca.markets</a></p>
  </div>
  
  <div class="form-group">
    <label for="alpacaSecret">Alpaca Secret Key</label>
    <input type="password" id="alpacaSecret" placeholder="Enter your Alpaca secret key">
  </div>
  
  <div class="actions">
    <button class="btn-secondary" onclick="window.close()">Cancel</button>
    <button class="btn-primary" onclick="saveSettings()">Save & Restart</button>
  </div>

  <script>
    // Load current settings
    window.electronAPI.getSettings().then(settings => {
      document.getElementById('alpacaKey').value = settings.alpacaKey || '';
      document.getElementById('alpacaSecret').value = settings.alpacaSecret || '';
    });

    async function saveSettings() {
      const settings = {
        alpacaKey: document.getElementById('alpacaKey').value,
        alpacaSecret: document.getElementById('alpacaSecret').value,
      };

      try {
        await window.electronAPI.saveSettings(settings);
        showStatus('Settings saved! Restarting server...', 'success');
        setTimeout(() => window.close(), 1500);
      } catch (e) {
        showStatus('Failed to save settings', 'error');
      }
    }

    function showStatus(message, type) {
      const status = document.getElementById('status');
      status.textContent = message;
      status.className = 'status ' + type;
    }
  </script>
</body>
</html>
