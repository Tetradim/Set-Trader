name: Build Windows Executable

on:
  workflow_dispatch:
    inputs:
      mongo_uri:
        description: 'MongoDB URI (default: localhost)'
        required: false
        default: 'mongodb://localhost:27017'
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify files exist
        run: |
          echo "Checking required files..."
          dir backend\requirements.txt
          dir frontend\yarn.lock

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'backend/requirements.txt'

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: 'frontend/yarn.lock'

      - name: Install Python dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Install Node dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ''
        run: yarn build

      - name: Copy frontend to backend/static
        run: |
          if (Test-Path backend\static) { Remove-Item -Recurse -Force backend\static }
          Copy-Item -Recurse frontend\dist backend\static

      - name: Create production .env
        working-directory: backend
        run: |
          $mongo = "${{ github.event.inputs.mongo_uri || 'mongodb://localhost:27017' }}"
          @"
          MONGO_URL=$mongo
          DB_NAME=bracketbot
          CORS_ORIGINS=http://localhost:8001,http://127.0.0.1:8001
          "@ | Out-File -Encoding UTF8 .env

      - name: Build with PyInstaller
        working-directory: backend
        run: |
          pyinstaller `
            --name "BracketBot" `
            --onedir `
            --noconsole `
            --add-data "static;static" `
            --add-data ".env;." `
            --hidden-import "uvicorn.logging" `
            --hidden-import "uvicorn.loops" `
            --hidden-import "uvicorn.loops.auto" `
            --hidden-import "uvicorn.protocols" `
            --hidden-import "uvicorn.protocols.http" `
            --hidden-import "uvicorn.protocols.http.auto" `
            --hidden-import "uvicorn.protocols.websockets" `
            --hidden-import "uvicorn.protocols.websockets.auto" `
            --hidden-import "uvicorn.lifespan" `
            --hidden-import "uvicorn.lifespan.on" `
            --hidden-import "motor" `
            --hidden-import "motor.motor_asyncio" `
            --hidden-import "pymongo" `
            --hidden-import "dns.resolver" `
            --hidden-import "yfinance" `
            --hidden-import "telegram" `
            --hidden-import "telegram.ext" `
            --collect-all "yfinance" `
            --collect-all "certifi" `
            --noconfirm `
            server.py

      - name: Create launcher
        working-directory: backend/dist
        run: |
          @"
          @echo off
          title BracketBot Terminal
          echo.
          echo  ========================================
          echo    BracketBot Terminal
          echo  ========================================
          echo.
          echo  Starting BracketBot...
          echo  Browser will open at http://localhost:8001
          echo.
          echo  Prerequisites:
          echo    - MongoDB running locally (mongod)
          echo    - OR edit BracketBot\.env with your Atlas URI
          echo.
          echo  Press Ctrl+C to stop.
          echo.
          timeout /t 2 /nobreak > nul
          start http://localhost:8001
          cd /d "%~dp0BracketBot"
          BracketBot.exe
          "@ | Out-File -Encoding ASCII "Start BracketBot.bat"

      - name: Create README for release
        working-directory: backend/dist
        run: |
          @"
          # BracketBot Terminal - Windows Release

          ## Quick Start
          1. Install MongoDB Community Edition (https://www.mongodb.com/try/download/community)
             OR use a MongoDB Atlas cloud URI
          2. Start MongoDB (run ``mongod`` in a terminal)
          3. Double-click ``Start BracketBot.bat``
          4. Browser opens to http://localhost:8001

          ## Configuration
          Edit ``BracketBot\.env`` to change:
          - ``MONGO_URL`` - Your MongoDB connection string
          - ``DB_NAME`` - Database name (default: bracketbot)

          ## MongoDB Atlas (Cloud)
          If you don't want to install MongoDB locally:
          1. Create a free cluster at https://cloud.mongodb.com
          2. Get your connection string
          3. Edit ``BracketBot\.env`` and set:
             ``MONGO_URL=mongodb+srv://user:password@cluster.mongodb.net/bracketbot``

          ## Troubleshooting
          - If the app doesn't start, check that MongoDB is running
          - If ports conflict, check that port 8001 is available
          - Logs are written to the terminal window
          "@ | Out-File -Encoding UTF8 "README.md"

      - name: Package for distribution
        run: |
          Compress-Archive -Path backend\dist\* -DestinationPath BracketBot-Windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BracketBot-Windows
          path: BracketBot-Windows.zip
          retention-days: 90

      - name: Create Release (on tag push)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: BracketBot-Windows.zip
          generate_release_notes: true
