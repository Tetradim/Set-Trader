name: Build Windows Installer

on:
  push:
    branches: [ Split, main ]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '*.ps1'
      - 'setup.iss'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Custom version (semver)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pyinstaller pillow

      - name: Build with PyInstaller
        run: |
          cd backend
          python -m PyInstaller --clean --onefile --windowed --name SentinelPulse server.py
        shell: pwsh

      - name: Install Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: setup.iss
          options: /O+ /DVersion=${{ github.event.inputs.version || '1.0.0-beta' }}

      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: SentinelPulse-Installer
          path: Output/SentinelPulse-Setup.exe
          if-no-files-found: error

      - name: Upload Artifacts (for debugging)
        uses: actions/upload-artifact@v4
        with:
          name: Build-Artifacts
          path: |
            backend/dist/
            Output/
