name: Build Sentinel Pulse

on:
  workflow_dispatch:
    inputs:
      mongo_uri:
        description: 'MongoDB URI (leave empty for localhost)'
        required: false
        default: ''
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install --extra-index-url https://d33sy5i8bnduwe.cloudfront.net/simple/ -r requirements.txt
          pip install pyinstaller

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: ''
        run: npm run build

      - name: Copy frontend to backend/static
        run: |
          if (Test-Path backend\static) { Remove-Item -Recurse -Force backend\static }
          Copy-Item -Recurse frontend\dist backend\static
        shell: pwsh

      - name: Create .env file
        working-directory: backend
        run: |
          $mongo = "${{ github.event.inputs.mongo_uri }}"
          if ([string]::IsNullOrEmpty($mongo)) { $mongo = "mongodb://localhost:27017" }
          @"
          MONGO_URL=$mongo
          DB_NAME=sentinelpulse
          CORS_ORIGINS=http://localhost:8001,http://127.0.0.1:8001
          "@ | Out-File -Encoding UTF8 .env
        shell: pwsh

      - name: Build executable with PyInstaller
        working-directory: backend
        run: |
          pyinstaller `
            --name "SentinelPulse" `
            --onedir `
            --noconsole `
            --add-data "static;static" `
            --add-data ".env;." `
            --hidden-import "uvicorn.logging" `
            --hidden-import "uvicorn.loops" `
            --hidden-import "uvicorn.loops.auto" `
            --hidden-import "uvicorn.protocols" `
            --hidden-import "uvicorn.protocols.http" `
            --hidden-import "uvicorn.protocols.http.auto" `
            --hidden-import "uvicorn.protocols.websockets" `
            --hidden-import "uvicorn.protocols.websockets.auto" `
            --hidden-import "uvicorn.lifespan" `
            --hidden-import "uvicorn.lifespan.on" `
            --hidden-import "motor" `
            --hidden-import "motor.motor_asyncio" `
            --hidden-import "pymongo" `
            --hidden-import "dns.resolver" `
            --hidden-import "yfinance" `
            --hidden-import "telegram" `
            --hidden-import "telegram.ext" `
            --hidden-import "opentelemetry" `
            --hidden-import "opentelemetry.trace" `
            --hidden-import "opentelemetry.sdk" `
            --hidden-import "opentelemetry.sdk.trace" `
            --collect-all "yfinance" `
            --collect-all "certifi" `
            --noconfirm `
            server.py
        shell: pwsh

      - name: Create launcher batch file
        working-directory: backend/dist
        run: |
          @"
          @echo off
          title Sentinel Pulse
          echo.
          echo  ==========================================
          echo    Sentinel Pulse - Trading Bot
          echo  ==========================================
          echo.
          echo  Starting server...
          echo  Browser will open at http://localhost:8001
          echo.
          echo  Press Ctrl+C to stop.
          echo.
          timeout /t 2 /nobreak > nul
          start http://localhost:8001
          cd /d "%~dp0SentinelPulse"
          SentinelPulse.exe
          "@ | Out-File -Encoding ASCII "Start Sentinel Pulse.bat"
        shell: pwsh

      - name: Create README
        working-directory: backend/dist
        run: |
          @"
          # Sentinel Pulse - Windows Release

          ## Quick Start
          1. Install MongoDB Community Edition OR use MongoDB Atlas
          2. Double-click "Start Sentinel Pulse.bat"
          3. Browser opens to http://localhost:8001

          ## Configuration
          Edit SentinelPulse\.env to change:
          - MONGO_URL - Your MongoDB connection string
          - DB_NAME - Database name (default: sentinelpulse)

          ## MongoDB Atlas (Cloud)
          1. Create a free cluster at https://cloud.mongodb.com
          2. Get your connection string
          3. Edit SentinelPulse\.env:
             MONGO_URL=mongodb+srv://user:password@cluster.mongodb.net

          ## Troubleshooting
          - Make sure MongoDB is running
          - Check port 8001 is available
          - Logs appear in the terminal window
          "@ | Out-File -Encoding UTF8 "README.txt"
        shell: pwsh

      - name: Create zip package
        run: Compress-Archive -Path backend\dist\* -DestinationPath SentinelPulse-Windows.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: SentinelPulse-Windows
          path: SentinelPulse-Windows.zip
          retention-days: 90

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: SentinelPulse-Windows.zip
          generate_release_notes: true
          body: |
            ## Sentinel Pulse - Windows Release
            
            ### Installation
            1. Download `SentinelPulse-Windows.zip`
            2. Extract to any folder
            3. Run `Start Sentinel Pulse.bat`
            
            ### Requirements
            - Windows 10/11 (64-bit)
            - MongoDB (local or Atlas cloud)
            - Internet connection for price data
