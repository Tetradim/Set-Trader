name: Build Sentinel Pulse

on:
  push:
    branches: [Split, main]
    paths:
      - 'backend/**'
      - 'frontend/**'
      - '*.ps1'
      - 'setup.iss'
      - '.github/workflows/build.yml'
  workflow_dispatch:
    inputs:
      version:
        description: 'Custom version (semver)'
        required: false
        default: ''

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 90
    name: Build Windows Installer

    steps:
      # ---------------------------------------------------------------------
      # 1. Checkout
      # ---------------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@v4

      # ---------------------------------------------------------------------
      # 2. Setup Python
      # ---------------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ---------------------------------------------------------------------
      # 3. Install Node.js (for frontend build)
      # ---------------------------------------------------------------------
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # ---------------------------------------------------------------------
      # 4. Install Python dependencies
      # ---------------------------------------------------------------------
      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip wheel
          pip install -r backend/requirements.txt
          pip install pyinstaller pillow

      # ---------------------------------------------------------------------
      # 5. Build frontend (React static files)
      # ---------------------------------------------------------------------
      - name: Build frontend
        run: |
          cd frontend
          npm install
          npm run build
        continue-on-error: true

      # ---------------------------------------------------------------------
      # 6. Create .env for bundled app
      # ---------------------------------------------------------------------
      - name: Create .env
        run: |
          @"
          MONGO_URL=mongodb://localhost:27017
          DB_NAME=sentinelpulse
          CORS_ORIGINS=http://localhost:8000,http://127.0.0.1:8000
          DEMO_MODE=true
          PORT=8002
          LOG_LEVEL=DEBUG
          "@ | Out-File -Encoding UTF8 backend/.env

      # ---------------------------------------------------------------------
      # 7. Build with PyInstaller
      # ---------------------------------------------------------------------
      - name: Build exe
        working-directory: backend
        run: |
          python -m PyInstaller --clean sentinel_win.spec

      # ---------------------------------------------------------------------
      # 8. Verify exe exists
      # ---------------------------------------------------------------------
      - name: Verify exe
        run: |
          $exe = "backend\dist\SentinelPulse\SentinelPulse.exe"
          if (!(Test-Path $exe)) {
            Write-Host "ERROR: $exe not found"
            Get-ChildItem -Path "backend\dist" -Recurse -Filter "*.exe" -ErrorAction SilentlyContinue
            exit 1
          }
          Write-Host "SUCCESS: Built $exe"
          Get-Item $exe | Select-Object Name, @{N="Size(MB)";E={[math]::Round($_.Length/1MB,2)}}

      # ---------------------------------------------------------------------
      # 9. Install Inno Setup
      # ---------------------------------------------------------------------
      - name: Install Inno Setup
        uses: Minionguyjpro/Inno-Setup-Action@v1.2.2
        with:
          path: setup.iss
          options: /O+ /DVersion=${{ github.event.inputs.version || '1.0.0' }}

      # ---------------------------------------------------------------------
      # 10. Upload artifacts
      # ---------------------------------------------------------------------
      - name: Upload Installer
        uses: actions/upload-artifact@v4
        with:
          name: SentinelPulse-Setup
          path: Output/SentinelPulse-Setup.exe
          if-no-files-found: error

      - name: Upload Standalone Exe
        uses: actions/upload-artifact@v4
        with:
          name: SentinelPulse-Exe
          path: backend/dist/SentinelPulse