name: Build, Test & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --wait --build

      - name: Backend smoke test
        run: |
          curl -sf http://localhost:8001/api/health | jq .
          curl -sf http://localhost:8001/api/tickers | jq .

      - name: Frontend smoke test
        run: curl -sf http://localhost:3000 > /dev/null

      - name: Tear down
        if: always()
        run: docker compose down -v

  build-windows-exe:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'yarn'
          cache-dependency-path: frontend/yarn.lock

      - name: Install Yarn
        run: npm install -g yarn

      # ---- Frontend Build ----
      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install --frozen-lockfile

      - name: Build frontend
        working-directory: frontend
        env:
          REACT_APP_BACKEND_URL: http://localhost:8001
        run: yarn build

      - name: Copy frontend to backend/static
        run: |
          if (Test-Path backend\static) { Remove-Item -Recurse -Force backend\static }
          Copy-Item -Recurse frontend\dist backend\static
        shell: pwsh

      # ---- Backend Build ----
      - name: Install Python dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Create desktop .env
        working-directory: backend
        run: |
          @"
          MONGO_URL=mongodb://localhost:27017
          DB_NAME=bracketbot
          CORS_ORIGINS=http://localhost:8001,http://127.0.0.1:8001
          "@ | Out-File -Encoding UTF8 .env
        shell: pwsh

      - name: Build executable with PyInstaller
        working-directory: backend
        run: |
          pyinstaller `
            --name "BracketBot" `
            --onedir `
            --noconsole `
            --add-data "static;static" `
            --add-data ".env;." `
            --hidden-import "uvicorn.logging" `
            --hidden-import "uvicorn.loops" `
            --hidden-import "uvicorn.loops.auto" `
            --hidden-import "uvicorn.protocols" `
            --hidden-import "uvicorn.protocols.http" `
            --hidden-import "uvicorn.protocols.http.auto" `
            --hidden-import "uvicorn.protocols.websockets" `
            --hidden-import "uvicorn.protocols.websockets.auto" `
            --hidden-import "uvicorn.lifespan" `
            --hidden-import "uvicorn.lifespan.on" `
            --hidden-import "motor" `
            --hidden-import "motor.motor_asyncio" `
            --hidden-import "pymongo" `
            --hidden-import "dns.resolver" `
            --hidden-import "yfinance" `
            --hidden-import "telegram" `
            --collect-all "yfinance" `
            --collect-all "certifi" `
            server.py
        shell: pwsh

      # ---- Package ----
      - name: Create launcher
        run: |
          $launcher = @"
          @echo off
          title BracketBot Terminal v3.0
          echo.
          echo  ========================================
          echo    BracketBot Terminal v3.0
          echo  ========================================
          echo.
          echo  Opening browser at http://localhost:8001
          echo  Press Ctrl+C to stop the bot.
          echo.
          timeout /t 2 /nobreak > nul
          start http://localhost:8001
          cd /d "%~dp0BracketBot"
          BracketBot.exe
          "@
          $launcher | Out-File -Encoding ASCII "backend\dist\Start BracketBot.bat"
        shell: pwsh

      - name: Create zip archive
        run: |
          Compress-Archive -Path "backend\dist\BracketBot", "backend\dist\Start BracketBot.bat" -DestinationPath "BracketBot-Windows-${{ github.ref_name }}.zip"
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: BracketBot-Windows-${{ github.ref_name }}
          path: BracketBot-Windows-${{ github.ref_name }}.zip
          retention-days: 90

  build-and-push:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service: [backend, frontend]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          file: ./${{ matrix.service }}/Dockerfile.prod
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-${{ matrix.service }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    needs: [build-and-push, build-windows-exe]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows exe artifact
        uses: actions/download-artifact@v4
        with:
          name: BracketBot-Windows-${{ github.ref_name }}

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: BracketBot-Windows-${{ github.ref_name }}.zip
          body: |
            ## Downloads
            **Windows:** Download `BracketBot-Windows-${{ github.ref_name }}.zip`, extract, and run `Start BracketBot.bat`
            Requires MongoDB installed locally or set a MongoDB Atlas URI in `BracketBot/.env`

            ## Docker Images
            ```bash
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend:${{ github.sha }}
            docker pull ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ github.sha }}
            ```
